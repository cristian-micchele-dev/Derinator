services:
  - type: web
    name: derinator-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: ./derinator.db
      - key: CORS_ORIGIN
        sync: false
