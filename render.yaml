services:
  - type: web
    name: derinator-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm rebuild sqlite3 && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: npm_config_build_from_source
        value: "true"
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /data/derinator.db
      - key: CORS_ORIGIN
        sync: false
    disk:
      name: derinator-data
      mountPath: /data
      sizeGB: 1
